replicaCount: 2

image:
  repository: finoptica/backend
  pullPolicy: IfNotPresent
  tag: "1.0.0"

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: finoptica.enterprise.internal
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: finoptica-tls-cert
      hosts:
        - finoptica.enterprise.internal

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 250m
    memory: 512Mi

nodeSelector: {}

tolerations: []

affinity: {}
