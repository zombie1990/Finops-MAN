apiVersion: v1
kind: Service
metadata:
  name: finoptica-backend-service
  namespace: finops-enterprise
spec:
  selector:
    app: finoptica-backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: finoptica-frontend-service
  namespace: finops-enterprise
spec:
  selector:
    app: finoptica-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finoptica-ingress
  namespace: finops-enterprise
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  tls:
  - hosts:
    - finoptica.enterprise.internal
    secretName: finoptica-tls-cert
  rules:
  - host: finoptica.enterprise.internal
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: finoptica-frontend-service
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: finoptica-backend-service
            port:
              number: 8000
