apiVersion: v1
kind: ConfigMap
metadata:
  name: finoptica-config
  namespace: finops-enterprise
data:
  DEFAULT_LLM_MODEL: "gpt-4o"
  APP_ENV: "production"
  ALLOW_ANONYMOUS_AUTH: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: finoptica-secrets
  namespace: finops-enterprise
type: Opaque
stringData:
  DATABASE_URL: "postgresql://finoptica_user:change-me@postgres-service.finops-enterprise.svc.cluster.local:5432/finoptica_prod"
  SECRET_KEY: "change-me-with-a-long-random-secret"
  DEFAULT_ADMIN_PASSWORD: "change-me"
  OPENAI_API_KEY: "change-me"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finoptica-backend
  namespace: finops-enterprise
  labels:
    app: finoptica-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finoptica-backend
  template:
    metadata:
      labels:
        app: finoptica-backend
    spec:
      containers:
      - name: backend
        image: finoptica/backend:v1.0.0
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: finoptica-config
        - secretRef:
            name: finoptica-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finoptica-frontend
  namespace: finops-enterprise
  labels:
    app: finoptica-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finoptica-frontend
  template:
    metadata:
      labels:
        app: finoptica-frontend
    spec:
      containers:
      - name: frontend
        image: finoptica/frontend:v1.0.0
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
